<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Project Forge AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #f0f4fc 0%, #e6edf8 100%); 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reset-card {
      background: white;
      border-radius: 48px;
      padding: 2.5rem;
      width: 450px;
      max-width: 90%;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      text-align: center;
    }
    .logo { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; background: linear-gradient(120deg, #1a4d3a, #0f3b5c); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .input-field {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 60px;
      border: 1px solid #cbd5e1;
      font-family: inherit;
    }
    .btn {
      background: linear-gradient(95deg, #0f2b3d, #1e4a3b);
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 700;
      color: white;
      border: none;
      cursor: pointer;
    }
    .btn:hover { transform: translateY(-2px); }
    .message { margin-top: 1rem; font-size: 0.8rem; }
    .back-link { margin-top: 1rem; }
    .back-link a { color: #1c6e46; text-decoration: none; font-size: 0.75rem; }
  </style>
</head>
<body>
<div class="reset-card">
  <div class="logo">⚡ Project Forge AI</div>
  <h3>Set New Password</h3>
  <p style="margin: 0.5rem 0 1rem; font-size: 0.8rem; color: #666;">Enter your new password below</p>
  <input type="password" id="newPassword" placeholder="New Password (min 6 characters)" class="input-field">
  <input type="password" id="confirmPassword" placeholder="Confirm Password" class="input-field">
  <button id="resetBtn" class="btn">✅ Reset Password</button>
  <div id="message" class="message"></div>
  <div class="back-link"><a href="https://aiforgen.netlify.app">← Back to Login</a></div>
</div>

<script>
  const SUPABASE_URL = 'https://rfejuvethmxenitvkyjp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmZWp1dmV0aG14ZW5pdHZreWpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzY4NDgsImV4cCI6MjA5MDUxMjg0OH0.fyrT8xFyQpnrWOQRYC4OS6vhofV5bB7_su6YxkGKXm8';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const msgEl = document.getElementById('message');

  // ─── URL hash se Supabase session extract karo ───────────────
  // Supabase reset link mein #access_token=...&type=recovery hota hai
  async function initSession() {
    const hash = window.location.hash;
    
    if (!hash || !hash.includes('access_token')) {
      msgEl.innerHTML = '❌ Invalid or expired reset link. Please request a new one.';
      msgEl.style.color = '#ef4444';
      document.getElementById('resetBtn').disabled = true;
      return;
    }

    // Hash se params parse karo
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');

    if (type !== 'recovery' || !accessToken) {
      msgEl.innerHTML = '❌ Invalid reset link type. Please request a new password reset.';
      msgEl.style.color = '#ef4444';
      document.getElementById('resetBtn').disabled = true;
      return;
    }

    // Session set karo
    const { error } = await supabase.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken || ''
    });

    if (error) {
      msgEl.innerHTML = '❌ Session expired. Please request a new reset link.';
      msgEl.style.color = '#ef4444';
      document.getElementById('resetBtn').disabled = true;
    } else {
      msgEl.innerHTML = '✅ Link verified! Enter your new password below.';
      msgEl.style.color = '#1c6e46';
    }
  }

  // Page load pe session init karo
  initSession();

  document.getElementById('resetBtn').addEventListener('click', async function() {
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;

    if (!newPass || newPass.length < 6) {
      msgEl.innerHTML = '❌ Password must be at least 6 characters';
      msgEl.style.color = '#ef4444';
      return;
    }
    if (newPass !== confirmPass) {
      msgEl.innerHTML = '❌ Passwords do not match';
      msgEl.style.color = '#ef4444';
      return;
    }

    msgEl.innerHTML = '⏳ Updating password...';
    msgEl.style.color = '#666';

    const { error } = await supabase.auth.updateUser({ password: newPass });

    if (error) {
      msgEl.innerHTML = '❌ ' + error.message;
      msgEl.style.color = '#ef4444';
    } else {
      msgEl.innerHTML = '✅ Password updated! Redirecting to login...';
      msgEl.style.color = '#1c6e46';
      // Session clear karo aur redirect karo
      await supabase.auth.signOut();
      setTimeout(() => {
        window.location.href = 'https://aiforgen.netlify.app';
      }, 2000);
    }
  });
</script>
</body>
</html>
